<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#020617"/>
    </radialGradient>
    <radialGradient id="glow1" cx="50%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="30%" cy="60%" r="30%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow3" cx="70%" cy="55%" r="25%">
      <stop offset="0%" stop-color="#f97316" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#f97316" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="50%" stop-color="#22d3ee" stop-opacity="1"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="circuitGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.1"/>
    </linearGradient>
    <filter id="blur1">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
    <filter id="blur2">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="textGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="smallGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- Ambient glow orbs -->
  <ellipse cx="960" cy="480" rx="700" ry="400" fill="url(#glow1)" filter="url(#blur1)"/>
  <ellipse cx="500" cy="650" rx="500" ry="350" fill="url(#glow2)" filter="url(#blur1)"/>
  <ellipse cx="1400" cy="580" rx="400" ry="300" fill="url(#glow3)" filter="url(#blur1)"/>

  <!-- Grid pattern -->
  <g opacity="0.06" stroke="#22d3ee" stroke-width="1">
    <line x1="0" y1="200" x2="1920" y2="200"/>
    <line x1="0" y1="400" x2="1920" y2="400"/>
    <line x1="0" y1="600" x2="1920" y2="600"/>
    <line x1="0" y1="800" x2="1920" y2="800"/>
    <line x1="384" y1="0" x2="384" y2="1080"/>
    <line x1="768" y1="0" x2="768" y2="1080"/>
    <line x1="1152" y1="0" x2="1152" y2="1080"/>
    <line x1="1536" y1="0" x2="1536" y2="1080"/>
  </g>

  <!-- Circuit lines -->
  <g stroke="url(#circuitGrad)" stroke-width="1.5" fill="none" opacity="0.4">
    <!-- Left circuit -->
    <path d="M 200,540 L 350,540 L 400,490 L 550,490"/>
    <path d="M 200,560 L 320,560 L 370,610 L 500,610"/>
    <path d="M 250,500 L 380,500 L 420,460 L 520,460"/>
    <!-- Right circuit -->
    <path d="M 1720,540 L 1570,540 L 1520,490 L 1370,490"/>
    <path d="M 1720,560 L 1600,560 L 1550,610 L 1420,610"/>
    <path d="M 1670,500 L 1540,500 L 1500,460 L 1400,460"/>
    <!-- Bottom circuits -->
    <path d="M 700,750 L 700,800 L 750,850 L 900,850"/>
    <path d="M 1220,750 L 1220,800 L 1170,850 L 1020,850"/>
  </g>

  <!-- Circuit nodes -->
  <g fill="#22d3ee" opacity="0.5">
    <circle cx="550" cy="490" r="4"/>
    <circle cx="500" cy="610" r="4"/>
    <circle cx="520" cy="460" r="4"/>
    <circle cx="1370" cy="490" r="4"/>
    <circle cx="1420" cy="610" r="4"/>
    <circle cx="1400" cy="460" r="4"/>
    <circle cx="900" cy="850" r="4"/>
    <circle cx="1020" cy="850" r="4"/>
  </g>

  <!-- Central hexagonal shape -->
  <g transform="translate(960, 420)" opacity="0.08" stroke="#22d3ee" stroke-width="2" fill="none">
    <polygon points="0,-180 156,-90 156,90 0,180 -156,90 -156,-90"/>
    <polygon points="0,-130 113,-65 113,65 0,130 -113,65 -113,-65"/>
    <polygon points="0,-80 69,-40 69,40 0,80 -69,40 -69,-40"/>
  </g>

  <!-- Decorative dots -->
  <g fill="#22d3ee" opacity="0.15">
    <circle cx="300" cy="300" r="2"/>
    <circle cx="340" cy="320" r="1.5"/>
    <circle cx="280" cy="340" r="1"/>
    <circle cx="1600" cy="280" r="2"/>
    <circle cx="1640" cy="310" r="1.5"/>
    <circle cx="1580" cy="330" r="1"/>
    <circle cx="500" cy="200" r="1.5"/>
    <circle cx="1420" cy="220" r="1.5"/>
    <circle cx="800" cy="150" r="1"/>
    <circle cx="1100" cy="170" r="1"/>
  </g>

  <!-- Top line accent -->
  <rect x="660" y="310" width="600" height="1" fill="url(#lineGrad)" opacity="0.6"/>

  <!-- AI chip icon -->
  <g transform="translate(960, 400)" opacity="0.2">
    <rect x="-35" y="-35" width="70" height="70" rx="8" stroke="#22d3ee" stroke-width="1.5" fill="none"/>
    <rect x="-20" y="-20" width="40" height="40" rx="4" stroke="#22d3ee" stroke-width="1" fill="#22d3ee" fill-opacity="0.1"/>
    <!-- Chip pins -->
    <line x1="-15" y1="-35" x2="-15" y2="-50" stroke="#22d3ee" stroke-width="1.5"/>
    <line x1="0" y1="-35" x2="0" y2="-50" stroke="#22d3ee" stroke-width="1.5"/>
    <line x1="15" y1="-35" x2="15" y2="-50" stroke="#22d3ee" stroke-width="1.5"/>
    <line x1="-15" y1="35" x2="-15" y2="50" stroke="#22d3ee" stroke-width="1.5"/>
    <line x1="0" y1="35" x2="0" y2="50" stroke="#22d3ee" stroke-width="1.5"/>
    <line x1="15" y1="35" x2="15" y2="50" stroke="#22d3ee" stroke-width="1.5"/>
    <line x1="-35" y1="-15" x2="-50" y2="-15" stroke="#22d3ee" stroke-width="1.5"/>
    <line x1="-35" y1="0" x2="-50" y2="0" stroke="#22d3ee" stroke-width="1.5"/>
    <line x1="-35" y1="15" x2="-50" y2="15" stroke="#22d3ee" stroke-width="1.5"/>
    <line x1="35" y1="-15" x2="50" y2="-15" stroke="#22d3ee" stroke-width="1.5"/>
    <line x1="35" y1="0" x2="50" y2="0" stroke="#22d3ee" stroke-width="1.5"/>
    <line x1="35" y1="15" x2="50" y2="15" stroke="#22d3ee" stroke-width="1.5"/>
    <text x="0" y="6" text-anchor="middle" fill="#22d3ee" font-size="16" font-family="monospace" font-weight="bold">AI</text>
  </g>

  <!-- Main Title -->
  <text x="960" y="540" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="900" font-size="90" letter-spacing="8" fill="url(#titleGrad)" filter="url(#textGlow)">
    AI MAHAKURUKSHETRA
  </text>

  <!-- Subtitle -->
  <text x="960" y="600" text-anchor="middle" font-family="ui-monospace, monospace" font-weight="400" font-size="20" letter-spacing="12" fill="#22d3ee" opacity="0.7" filter="url(#smallGlow)">
    THE ULTIMATE AI BATTLE
  </text>

  <!-- Bottom line accent -->
  <rect x="710" y="630" width="500" height="1" fill="url(#lineGrad)" opacity="0.4"/>

  <!-- Bottom info -->
  <text x="960" y="680" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="400" font-size="16" letter-spacing="4" fill="#9ca3af" opacity="0.6">
    THINK • BUILD • LAUNCH
  </text>

  <!-- Bacancy branding -->
  <text x="960" y="730" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-weight="500" font-size="14" letter-spacing="6" fill="#6b7280" opacity="0.4">
    BACANCY TECHNOLOGY • 2026
  </text>

  <!-- Corner accents -->
  <g stroke="#22d3ee" stroke-width="1" opacity="0.15">
    <path d="M 40,40 L 40,80 M 40,40 L 80,40"/>
    <path d="M 1880,40 L 1880,80 M 1880,40 L 1840,40"/>
    <path d="M 40,1040 L 40,1000 M 40,1040 L 80,1040"/>
    <path d="M 1880,1040 L 1880,1000 M 1880,1040 L 1840,1040"/>
  </g>
</svg>
